<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Suyu (Michael) Ye</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg?v=2" />
  <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <script>
    (function () {
      try {
        var s = localStorage.getItem('theme');
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', s || (d ? 'dark' : 'light'));
      } catch (e) {}
    })();
  </script>
  <style>
    .nf { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px; }
    .nf__code { font-family: var(--font-serif); font-size: clamp(4rem, 18vw, 8rem); line-height: 1; margin: 0; color: var(--accent); letter-spacing: -0.03em; }
    .nf__msg { color: var(--text-soft); margin: 8px 0 28px; font-size: 1.1rem; }
  </style>
</head>
<body>
  <main class="nf">
    <div>
      <p class="nf__code">404</p>
      <h1 class="section__title">This page wandered off.</h1>
      <p class="nf__msg">The URL is misplaced or no longer exists.</p>
      <a class="btn btn--primary" href="/">Head back home</a>
    </div>
  </main>
</body>
</html>
